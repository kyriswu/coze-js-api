services:
  app-blue:
    build: .
    image: my-custom-node-python-app
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      NODE_ENV: online
      REDIS_HOST: lite-chat-redis
      REDIS_DB: 1
    networks:
      - my-net
    restart: unless-stopped
    profiles:
      - bluegreen
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

  app-green:
    build: .
    image: my-custom-node-python-app
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
    ports:
      - "127.0.0.1:3004:3000"
    environment:
      NODE_ENV: online
      REDIS_HOST: lite-chat-redis
      REDIS_DB: 1
    networks:
      - my-net
    restart: unless-stopped
    profiles:
      - bluegreen
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

networks:
  my-net:
    driver: bridge
